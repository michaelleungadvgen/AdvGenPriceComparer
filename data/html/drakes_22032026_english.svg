  <text x="400" y="780" font-size="12.5" text-anchor="middle" fill="#5a3e1a">Drakes specials end 24 March. ALDI stock is limited — while stocks last!</text>
  <text x="400" y="802" font-size="11" text-anchor="middle" fill="#8b6946">* Prices and availability may vary by location. See in-store for most current offers.</text>
  
  <!-- 复活节装饰彩蛋 -->
  <g transform="translate(30, 850)">
    <circle cx="20" cy="25" r="14" fill="#f7d9a0" stroke="#d68b45" stroke-width="1.2"/>
    <text x="20" y="33" font-size="14" text-anchor="middle" fill="#b34e2e">🐣</text>
    <circle cx="730" cy="25" r="14" fill="#efb87e" stroke="#b45f2b" stroke-width="1.2"/>
    <text x="730" y="33" font-size="14" text-anchor="middle" fill="#5c2e1a">🥚</text>
  </g>
  
  <text x="400" y="920" font-size="13" text-anchor="middle" fill="#b28044" font-weight="500">🎉 Happy Easter Shopping — Great Savings Await! 🎉</text>
  <text x="400" y="950" font-size="10" text-anchor="middle" fill="#b29a6e">Drakes: lamb, seafood, seasonal produce & drinks | ALDI: camping, kitchen, TV & Easter treats</text>
</svg>