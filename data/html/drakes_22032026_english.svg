  <text x="210" y="200" font-size="28" font-weight="bold" text-anchor="middle" fill="white">Drakes</text>
  <text x="210" y="230" font-size="14" text-anchor="middle" fill="#fff0dd">📅 18 – 24 March | On Sale</text>
  
  <!-- Drakes 内容 -->
  <text x="50" y="275" font-size="15" font-weight="bold" fill="#b64926">🐣 Easter Chocolate — Half Price!</text>
  <text x="50" y="300" font-size="12.5" fill="#333">• Cadbury Easter Egg gift boxes from $6</text>
  <text x="50" y="320" font-size="12.5" fill="#333">• Kinder figurines, Darrell Lea Easter bunnies — specials</text>
  <text x="50" y="340" font-size="12.5" fill="#333">• Red Tulip Hollow Egg 170g — just $6</text>
  
  <text x="50" y="370" font-size="15" font-weight="bold" fill="#b64926">🍗 Meat & Seafood</text>
  <text x="50" y="395" font-size="12.5" fill="#333">• Australian Lamb Leg Boneless Roast — per kg special</text>
  <text x="50" y="415" font-size="12.5" fill="#333">• Fresh tiger prawns, salmon & swordfish (deli)</text>
  <text x="50" y="435" font-size="12.5" fill="#333">• Drakes Hot BBQ Chicken — ready to eat!</text>
  
  <text x="50" y="465" font-size="15" font-weight="bold" fill="#b64926">🥦 Fresh Produce</text>
  <text x="50" y="490" font-size="12.5" fill="#333">• Queensland Sweet Corn & Avocados 5-pack</text>
