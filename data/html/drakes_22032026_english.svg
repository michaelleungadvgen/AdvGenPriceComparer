  <text x="430" y="455" font-size="12.5" fill="#333">• Food Chopper or Hand Mixer $18.99</text>
  
  <text x="430" y="485" font-size="15" font-weight="bold" fill="#1f6392">📺 Tech & Entertainment (from Sat 28 Mar)</text>
  <text x="430" y="510" font-size="12.5" fill="#333">• BAUHN 50" Ultra HD WebOS TV $359</text>
  <text x="430" y="530" font-size="12.5" fill="#333">• BAUHN 70" Ultra HD WebOS TV $599</text>
  <text x="430" y="550" font-size="12.5" fill="#333">• Bluetooth Wireless Headphones $39.99</text>
  
  <text x="430" y="580" font-size="15" font-weight="bold" fill="#1f6392">🐰 Easter Snacks & Treats (from Wed 25 Mar)</text>
