<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1250" style="background:#fef8e8; font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c5f2d"/>
      <stop offset="100%" stop-color="#1e3a1e"/>
    </linearGradient>
    <linearGradient id="aldiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f6392"/>
      <stop offset="100%" stop-color="#124567"/>
    </linearGradient>
    <filter id="shadow" x="-0.02" y="-0.02" width="1.1" height="1.1">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景装饰 -->
  <rect width="800" height="1250" fill="#fef7e8"/>
  <circle cx="680" cy="200" r="150" fill="#fce5b4" opacity="0.3"/>
  <circle cx="100" cy="1100" r="220" fill="#ffe0b5" opacity="0.3"/>
  <path d="M30 1180 L770 1180" stroke="#f0dcb0" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- 主标题区 -->
  <rect x="0" y="0" width="800" height="130" fill="url(#headerGrad)"/>
  <text x="400" y="68" font-size="32" font-weight="bold" text-anchor="middle" fill="#FFD966" filter="url(#shadow)">🛒 Weekly Supermarket Deals</text>
  <text x="400" y="108" font-size="20" text-anchor="middle" fill="#FFEFC0">Drakes + ALDI Top Picks</text>
  <text x="400" y="140" font-size="14" text-anchor="middle" fill="#FFE0A3">🐣 Easter Specials | Limited Stock — While Stocks Last</text>

