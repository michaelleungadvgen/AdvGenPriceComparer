<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <style>
    .title-bg { fill: #2d3e50; }
    .winner-badge { fill: #ffc845; }
    .winner-text { fill: #1e2b36; font-weight: 800; }
    .price-tag-blue { fill: #0066b3; }
    .price-tag-red { fill: #e5171e; }
    .card-bg { fill: #ffffff; }
    .divider { stroke: #e0e0e0; stroke-width: 1; }
    .text-dark { fill: #1e2b36; }
    .text-muted { fill: #5a6872; }
    .accent-green { fill: #2c7a4d; }
    .highlight-yellow { fill: #ffd966; }
    .featured-badge { fill: #b33b3b; }
