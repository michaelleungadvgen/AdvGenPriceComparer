  <text x="20" y="28" fill="white" font-size="18" font-family="Arial, sans-serif" font-weight="bold">🛒 本週超市價格大戰 | Coles vs Woolworths 🛒</text>
  <text x="20" y="52" fill="#b0d4f0" font-size="14" font-family="Arial, sans-serif">📅 3月4日 - 10日 2026 &nbsp;&nbsp; 🏆 本週贏家：Coles - 35款商品更便宜！</text>

  <!-- AI summary row -->
  <rect x="20" y="80" width="360" height="75" fill="white" rx="8" ry="8" filter="url(#shadow)" />
  <text x="35" y="108" fill="#1e2b36" font-size="14" font-family="Arial, sans-serif" font-weight="bold">📊 AI 分析數據</text>
  <text x="35" y="130" fill="#5a6872" font-size="13" font-family="Arial, sans-serif">比較商品：77款 &nbsp; 可節省總額：$307+ &nbsp; Coles 最優：45% &nbsp; Woolworths 最優：40%</text>
  <text x="35" y="148" fill="#b33b3b" font-size="13" font-family="Arial, sans-serif" font-weight="bold">🔥 精選半價優惠</text>

