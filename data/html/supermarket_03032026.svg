  <rect x="20" y="685" width="360" height="95" fill="white" rx="8" ry="8" filter="url(#shadow)" />
  <text x="30" y="705" fill="#1e2b36" font-size="15" font-weight="bold">💡 購物小貼士</text>
  <line x1="30" y1="710" x2="350" y2="710" class="divider" />
  <text x="30" y="730" fill="#1e2b36" font-size="12">• 本週 Coles 在米類、飲料有明顯優勢</text>
  <text x="30" y="750" fill="#1e2b36" font-size="12">• Woolworths 零食、朱古力較便宜</text>
  <text x="30" y="770" fill="#1e2b36" font-size="12">• 復活節商品兩邊都有半價優惠</text>
  <text x="30" y="795" fill="#0066b3" font-size="11" font-family="Arial, sans-serif" text-decoration="underline">📍 完整比較報告：michaelleung.info/prices</text>
  <text x="30" y="815" fill="#5a6872" font-size="11">#超市優惠 #Coles #Woolworths #澳洲生活 #價格比較 #省錢攻略 #布里斯班</text>

  <!-- filter for shadow -->
